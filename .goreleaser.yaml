# .goreleaser.yaml
version: 2

env:
  - BUN_INSTALL=$HOME/.bun
  - PATH=$BUN_INSTALL/bin:$PATH

before:
  hooks:
    - curl -fsSL https://bun.sh/install | bash
    - make install
    - make build

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    binary: newsapp

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - assets/dist/**/*
      - README*
      - LICENSE*

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

checksum:
  name_template: 'checksums.txt'

# Removed deprecated snapshot.name_template

release:
  prerelease: auto
